<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Thato Ntlati</title>
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="fontawesome-free-7.1.0-web/css/all.min.css">
    
    <style>
        /* Specific styles for the Thank You page Layout */
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #080808 /*url(images/background.png) no-repeat center*/;
            background-size: cover;
            overflow: hidden; /* Prevents scrollbars */
        }

        .thank-you-card {
            /* Glassmorphism Effect */
            background: rgba(38, 38, 38, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 221, 255, 0.3); /* Subtle Cyan Border */
            
            padding: 50px;
            border-radius: 15px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            animation: popup 0.5s ease-out forwards;
        }

        .thank-you-card i {
            font-size: 70px;
            color: #00ddff;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(0, 221, 255, 0.6); /* Neon Glow */
        }

        .thank-you-card h1 {
            font-size: 40px;
            color: #fff;
            margin-bottom: 15px;
        }

        .thank-you-card p {
            color: #ababab;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Animation to make the card pop up smoothly */
        @keyframes popup {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="thank-you-card">
        <i class="fa-solid fa-circle-check"></i>
        <h1>Message Sent!</h1>
        <p>Thanks for reaching out, Thato. I have received your message and will get back to you shortly.</p>
        
        <a href="index.html" class="btn" style="margin: 0 auto; display: inline-block;">Back to Home</a>
    </div>

</body>
</html>
